<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TUMOU-BIN</title>

    <!-- TensorFlow + Teachable Machine (WAJIB urut ini) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>♻️ TUMOU-BIN</h1>
      <p>Scan Kamera &amp; Upload Gambar</p>
    </header>

    <main>
      <section class="card">
        <h3>📷 Kamera</h3>
        <button id="startBtn" type="button">🎥 Mulai Kamera</button>
        <div id="webcam-container"></div>
      </section>

      <section class="card">
        <h3>📁 Upload Gambar</h3>
        <input type="file" id="upload" accept="image/*" />
        <img id="preview" alt="Preview gambar yang diupload" />
      </section>

      <section class="card">
        <h2 id="hasil">Siap. Klik tombol kamera atau upload gambar.</h2>
        <div id="bar"></div>
      </section>
    </main>

    <footer>
      <p>© 2026 AI Sampah</p>
    </footer>

    <!-- script.js di paling bawah supaya tmImage sudah ada -->
    <script src="script.js"></script>
  </body>
</html>
